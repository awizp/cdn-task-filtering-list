<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/cdn-favicon-512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- tailwind css -->
  <link rel="stylesheet" href="./src/style.css">

  <title>Search or Filter the list items | Task 15</title>
</head>

<body>
  <main class="w-full">
    <section class="container mx-auto py-10 px-3 relative">

      <div class="flex flex-col justify-center items-center gap-5">
        <h1 class="text-3xl font-bold mb-3">Filter out your favourite foods</h1>

        <div class="input-group">
          <select name="country" id="country-items">
            <option value="India" selected>India</option>
            <option value="Canada">Canada</option>
            <option value="China">China</option>
            <option value="America">America</option>
            <option value="Russia">Russia</option>
            <option value="Japan">Japan</option>
          </select>

          <input type="text" placeholder="Search your food item..." id="search-item">
        </div>

        <!-- loading container -->
        <p class="text-xl font-semibold italic hidden" id="loading-message">Loading food items...</p>

        <!-- products container -->
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5"></div>
      </div>

    </section>
  </main>

  <!-- ionic icons script -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <!-- main javascript -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
